<!DOCTYPE html>
<html>
<body>
    <div id="arayuz">
        <h2 id="durum">Key Sistemine Hoşgeldiniz</h2>
        <button onclick="islemYap()">Keyi Al</button>
        <div id="keyAlani"></div>
    </div>
    <script>
        async function islemYap() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const id = "ROBLOX_ID_BURAYA"; // Roblox'tan gelen ID
            
            if(!token) {
                const res = await fetch('/api/get-link?id=' + id);
                const data = await res.json();
                window.location.href = data.link;
            } else {
                const res = await fetch('/api/key-olustur', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token, id})
                });
                const data = await res.json();
                document.getElementById('keyAlani').innerText = "Keyiniz: " + data.key;
            }
        }
    </script>
</body>
</html>
