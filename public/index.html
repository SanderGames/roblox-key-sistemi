<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SanderG | Secure Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@900&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #030303; color: #fff; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 150%; height: 150%; background: radial-gradient(circle, rgba(0,255,65,0.05) 0%, rgba(0,0,0,1) 50%); z-index: -1; }
        
        .auth-box { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; padding: 45px; border-radius: 16px; width: 420px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(0,255,65,0.1); backdrop-filter: blur(15px); transition: 0.5s; }
        .auth-box:hover { box-shadow: 0 15px 45px rgba(0,255,65,0.15), inset 0 0 0 1px rgba(0,255,65,0.4); }
        
        h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; color: #00ff41; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0,255,65,0.3); }
        p.subtitle { font-size: 11px; color: #666; margin-bottom: 30px; letter-spacing: 2px; }
        
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; background: #080808; border: 1px solid #222; color: #888; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #00ff41; color: #000; border-color: #00ff41; letter-spacing: 2px; }
        
        .btn-primary { background: rgba(0, 255, 65, 0.05); border-color: #00ff41; color: #00ff41; margin-top: 25px; }
        .btn-primary:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px rgba(0,255,65,0.4); }
        
        #terminal { margin-top: 25px; padding: 15px; background: #000; border: 1px dashed #333; border-radius: 8px; font-size: 12px; color: #00ff41; text-align: left; word-break: break-all; min-height: 60px; display: none; }
        
        .locked { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #050000; color: #ff0033; font-size: 22px; text-align: center; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const app = document.getElementById('app');
        
        // GÜVENLİK DUVARI: ID yoksa siteyi tamamen kitle
        if (!id) {
            app.innerHTML = '<div class="locked"><h1 style="color:#ff0033; text-shadow: 0 0 20px red;">⛔ SİSTEM KİLİTLİ</h1><p style="font-family:Montserrat; font-size:14px; color:#aaa;">Bağlantı reddedildi. Bu terminale sadece yetkili Roblox istemcisinden erişilebilir.</p><p style="font-size:10px;color:#444;margin-top:20px;">[SanderG Security Protocol V3 - IP Logged]</p></div>';
        } else {
            app.innerHTML = `
                <div class="auth-box">
                    <h1>SanderG</h1>
                    <p class="subtitle">SECURE ACCESS TERMINAL</p>
                    <button class="btn" onclick="task('sub', 'https://youtube.com/@Sander1GM')">[ 1 ] YOUTUBE ABONELİĞİ</button>
                    <button class="btn" onclick="task('join', 'https://discord.gg/sFJf4ujwt')">[ 2 ] DISCORD DOĞRULAMASI</button>
                    <button class="btn btn-primary" onclick="genKey()">[ ➔ ] ŞİFRELİ ANAHTARI OLUŞTUR</button>
                    <div id="terminal"></div>
                </div>
            `;
        }

        async function task(t, l) {
            window.open(l, '_blank');
            const term = document.getElementById('terminal');
            term.style.display = 'block'; 
            term.innerText = "> Sistem doğrulanıyor...";
            await fetch('/api/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id, task: t }) });
            term.innerText = `> Veritabanı güncellendi: [${t.toUpperCase()}] ONAYLANDI.`;
        }

        async function genKey() {
            const term = document.getElementById('terminal');
            term.style.display = 'block'; 
            term.style.color = '#00ff41';
            term.innerText = "> Şifreli tünel açılıyor...\n> Yetkiler kontrol ediliyor...";
            
            const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id }) });
            const d = await res.json();
            
            if (d.error) {
                term.style.color = '#ff0033'; 
                term.innerText = `> HATA TESPİT EDİLDİ:\n> ${d.error}`;
            } else {
                term.innerHTML = `> ERİŞİM İZNİ VERİLDİ.<br>> LİSANS ANAHTARINIZ:<br><br><strong style="font-size:14px; background:#00ff41; color:#000; padding:2px 5px;">${d.key}</strong><br><br>> <span style="cursor:pointer;text-decoration:underline;" onclick="navigator.clipboard.writeText('${d.key}');alert('Anahtar panoya kopyalandı!')">[PANOYA KOPYALA]</span>`;
            }
        }
    </script>
</body>
</html>
