<!DOCTYPE html>
<html lang="tr">
<head>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .card { background: #111; border: 2px solid #00ff41; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px #00ff4133; width: 350px; text-align: center; }
        h1 { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        button { background: #00ff41; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; width: 100%; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #008f11; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SanderG</h1>
        <div id="app">
            <button onclick="window.open('https://youtube.com/@Sander1GM', '_blank'); verify('sub')">Abone Ol</button>
            <button onclick="window.open('https://youtube.com/shorts/6oePpN-TxTY', '_blank'); verify('watch')">Videoyu İzle</button>
            <button onclick="window.open('https://discord.gg/sFJf4ujwt', '_blank')">Discord'a Katıl</button>
            <button style="background: #008f11; color: white;" onclick="getKey()">Keyi Al</button>
        </div>
        <div id="keyBox" style="margin-top: 15px; font-weight: bold; color: #00ff41;"></div>
    </div>
</body>
</html>
