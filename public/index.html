<!DOCTYPE html>
<html>
<body>
    <button onclick="gorevYap('sub', 'KANAL_LINKI')">1. Abone Ol</button>
    <button onclick="gorevYap('watch', 'VIDEO_LINKI')">2. Videoyu İzle</button>
    <button onclick="keyAl()">Keyi Al</button>
    <div id="sonuc"></div>

    <script>
        const userId = "USER_ID_BURAYA"; // Roblox'tan çekilmeli
        async function gorevYap(type, link) {
            window.open(link, '_blank');
            await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId, task: type})
            });
        }
        async function keyAl() {
            const res = await fetch('/api/get-key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId})
            });
            const data = await res.json();
            document.getElementById('sonuc').innerText = "Keyiniz: " + data.key;
        }
    </script>
</body>
</html>
